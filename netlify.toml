[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/og-image"
  to = "/.netlify/functions/og-image"
  status = 200

[[redirects]]
  from = "/api/sheets"
  to = "/.netlify/functions/sheets"
  status = 200
